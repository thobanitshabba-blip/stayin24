<!DOCTYPE html>
<html>
<head>
<title>Stayin24</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}

header{background:#0a2540;color:white;padding:20px;text-align:center;}

.cards{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}

.card{
background:white;
margin:10px;
padding:15px;
width:250px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
border-radius:10px;
cursor:pointer;
}

.card img{width:100%;border-radius:10px;}

.container{padding:20px;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
margin-top:15px;
}

input{padding:12px;width:100%;margin-top:10px;}
</style>
</head>

<body>

<header>
<h1>Stayin24</h1>
<p>Find Rooms Anytime, Anywhere</p>
</header>

<!-- HOME PAGE -->
<div id="home">

<div class="cards">

<div class="card" onclick="openRoom('Luxury Apartment','Durban','R850 / night','https://picsum.photos/400?1')">
<img src="https://picsum.photos/300/200?1">
<h3>Luxury Apartment</h3>
<p>Durban</p>
<p>R850 / night</p>
</div>

<div class="card" onclick="openRoom('Modern Studio','Johannesburg','R600 / night','https://picsum.photos/400?2')">
<img src="https://picsum.photos/300/200?2">
<h3>Modern Studio</h3>
<p>Johannesburg</p>
<p>R600 / night</p>
</div>

</div>

</div>

<!-- ROOM DETAILS PAGE -->
<div id="roomPage" style="display:none;">

<div class="container">

<button onclick="goBack()">⬅ Back</button>

<img id="roomImage">

<h2 id="roomTitle"></h2>
<p id="roomCity"></p>
<h3 id="roomPrice"></h3>

<label>Check-in</label>
<input type="date">

<label>Check-out</label>
<input type="date">

<button onclick="bookRoom()">BOOK NOW</button>

</div>

</div>

<script>

function openRoom(title, city, price, image){

document.getElementById("home").style.display="none";
document.getElementById("roomPage").style.display="block";

document.getElementById("roomTitle").innerText = title;
document.getElementById("roomCity").innerText = city;
document.getElementById("roomPrice").innerText = price;
document.getElementById("roomImage").src = image;

}

function goBack(){
document.getElementById("home").style.display="block";
document.getElementById("roomPage").style.display="none";
}

function bookRoom(){

const checkin = document.querySelectorAll("input")[0].value;
const checkout = document.querySelectorAll("input")[1].value;

if(!checkin || !checkout){
alert("Please select dates 📅");
return;
}

alert("Booking successful 🔥");

}
</script>

</body>
</html>
