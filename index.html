<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f2f2f2;
}

header{
  background:linear-gradient(135deg,#0a66c2,#004182);
  color:white;
  padding:25px;
  text-align:center;
}

.hero{
  background:white;
  padding:30px;
  text-align:center;
}

input{
  padding:12px;
  width:80%;
  max-width:320px;
  border-radius:25px;
  border:1px solid #ccc;
  margin:10px;
}

button{
  padding:12px 25px;
  border:none;
  background:#0a66c2;
  color:white;
  border-radius:25px;
  font-size:16px;
}

.container{
  padding:15px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
}

.card-content{
  padding:15px;
}

.price{
  color:#0a66c2;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<header>
  <h1>StayIn24</h1>
  <p>Find stays worldwide</p>
</header>

<section class="hero">
  <h2>Book your perfect stay</h2>
  <input type="text" placeholder="Search city..."><br>
  <button>Search</button>
</section>

<div class="container">

  <div class="card">
    <img src="https://picsum.photos/400/250?1">
    <div class="card-content">
      <h3>Luxury Apartment</h3>
      <p>Durban</p>
      <p class="price">R850 / night</p>
      <button>Book now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/250?2">
    <div class="card-content">
      <h3>Modern Studio</h3>
      <p>Johannesburg</p>
      <p class="price">R600 / night</p>
      <button>Book now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/250?3">
    <div class="card-content">
      <h3>Beach Room</h3>
      <p>Cape Town</p>
      <p class="price">R1200 / night</p>
      <button>Book now</button>
    </div>
  </div>

</div>

</body>
  </html>
