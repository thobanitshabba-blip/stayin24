<!DOCTYPE html>
<html>
<head>
<title>Stayin24</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

.hero{
padding:60px;
text-align:center;
background:white;
}

input,button{
padding:12px;
margin:5px;
font-size:16px;
}

button{
background:#ff5a5f;
color:white;
border:none;
cursor:pointer;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
margin:10px;
padding:20px;
width:250px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<h1>Stayin24</h1>
<p>Find Rooms Anytime, Anywhere</p>
</header>

<section class="hero">
<h2>Book Your Stay</h2>
<input placeholder="City">
<input type="date">
<input type="date">
<br>
<button>Search Rooms</button>
</section>

<section class="cards">
<div class="card">
<h3>Luxury Apartment</h3>
<p>Durban</p>
<p>R850 / night</p>
</div>

<div class="card">
<h3>Modern Studio</h3>
<p>Johannesburg</p>
<p>R600 / night</p>
</div>

<div class="card">
<h3>Beach Room</h3>
<p>Cape Town</p>
<p>R1200 / night</p>
</div>
</section>

</body>
  </html>
