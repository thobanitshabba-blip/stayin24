<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ---------------- ROOMS DATA ---------------- */
  const rooms = [
    {
      id: 1,
      name: "Deluxe Room",
      price: 1200,
      image: "images/room1.jpg",
      bookedDates: ["2026-03-10", "2026-03-11"]
    },
    {
      id: 2,
      name: "Executive Suite",
      price: 2500,
      image: "images/room2.jpg",
      bookedDates: []
    }
  ];

  const container = document.querySelector(".rooms-container");

  /* ---------------- LOGIN SYSTEM ---------------- */
  function isLoggedIn() {
    return localStorage.getItem("user");
  }

  function login() {
    const name = prompt("Enter your name to login");
    if (name) {
      localStorage.setItem("user", name);
      alert("Welcome " + name);
    }
  }

  /* ---------------- DISPLAY ROOMS ---------------- */
  function displayRooms(roomList) {
    container.innerHTML = "";

    roomList.forEach(room => {
      container.innerHTML += `
        <div class="room-card" onclick="openRoom(${room.id})">
          <img src="${room.image}" width="100%">
          <h3>${room.name}</h3>
          <p>R${room.price} / night</p>
        </div>
      `;
    });
  }

  displayRooms(rooms);

  /* ---------------- SEARCH (YOUR CURRENT ONE STILL WORKS) ---------------- */
  window.searchRooms = function () {
    const value = document.querySelector("#search").value.toLowerCase();

    const filtered = rooms.filter(room =>
      room.name.toLowerCase().includes(value)
    );

    displayRooms(filtered);
  };

  /* ---------------- OPEN ROOM DETAILS ---------------- */
  window.openRoom = function (id) {
    const room = rooms.find(r => r.id === id);

    container.innerHTML = `
      <div class="room-details">
        <img src="${room.image}" width="300">

        <h2>${room.name}</h2>
        <p>Price: R${room.price} per night</p>

        <label>Select date:</label>
        <input type="date" id="datePicker">

        <br><br>

        <button onclick="bookRoom(${room.id})">Book Now</button>
        <button onclick="goBack()">⬅ Back</button>
      </div>
    `;
  };

  /* ---------------- BOOKING SYSTEM ---------------- */
  window.bookRoom = function (id) {

    if (!isLoggedIn()) {
      login();
      return;
    }

    const selectedDate = document.getElementById("datePicker").value;

    if (!selectedDate) {
      alert("Please select a date");
      return;
    }

    const room = rooms.find(r => r.id === id);

    if (room.bookedDates.includes(selectedDate)) {
      alert("❌ Room not available on this date");
    } else {
      room.bookedDates.push(selectedDate);
      alert("✅ Booking confirmed for " + selectedDate);
    }
  };

  /* ---------------- BACK BUTTON ---------------- */
  window.goBack = function () {
    displayRooms(rooms);
  };

});
</script>
