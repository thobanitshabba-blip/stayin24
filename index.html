<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f6f8;
}

header{
  background:linear-gradient(135deg,#0a66c2,#004182);
  color:white;
  padding:30px 20px;
  text-align:center;
}

.hero{
  padding:60px 20px;
  text-align:center;
  background:white;
}

input{
  padding:12px;
  width:80%;
  max-width:300px;
  border:1px solid #ccc;
  border-radius:8px;
  margin:10px;
}

button{
  padding:12px 20px;
  border:none;
  background:#0a66c2;
  color:white;
  border-radius:8px;
  font-size:16px;
}

.card{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
  <h1>StayIn24</h1>
  <p>Worldwide Hotel & Accommodation Booking</p>
</header>

<section class="hero">
  <h2>Find your perfect stay</h2>
  <input type="text" placeholder="Where are you going?">
  <br>
  <button>Search</button>
</section>

<div class="card">
  <h3>Luxury Hotel</h3>
  <p>$120 per night</p>
</div>

<div class="card">
  <h3>Beach Resort</h3>
  <p>$200 per night</p>
</div>

</body>
</html>
